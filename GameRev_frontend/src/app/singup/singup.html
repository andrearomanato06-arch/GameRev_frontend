<div class="body">
  <div class="singup-container">

    <img src="UserIcon.png" alt="Account icon" class="account-image">

    <img src="GameRevLogoBlkBg.png" alt="GameRev logo" class="logo">

    <form class="singup-form" id="login-form">
      <label for="username-field" class="input-label">Username</label>
      <input type="text" class="input-field" id="username-field" name="username" placeholder="Username">

      <label for="email-field" class="input-label">Email</label>
      <input type="text" class="input-field" id="email-field" name="email" placeholder="Email">

      <label for="password-field" class="input-label">Password</label>
      <input type="password" class="input-field" id="password-field" name="password" placeholder="Password">

      <label for="cnf-password-field" class="input-label">Confirm Password</label>
      <input type="password" class="input-field" id="cnf-password-field" name="cnf-password" placeholder="Confirm Password">

      <div class="show-password-ckbx">
        <input type="checkbox" id="show-password" (change)="showPassword()">
        <label for="show-password">show password</label>
      </div>
      <input type="submit" class="sbt-button" name="Sing Up" value="Sing Up">
    </form>

  </div>
</div>
